<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Página no encontrada — Lima Seguros</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="assets/favicon-48x48.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .error-page {
      min-height: 100vh;
      background: var(--gradient-hero);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .error-content h1 {
      font-size: 8rem;
      color: var(--gold-light);
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-content h2 {
      color: var(--white);
      font-size: 2rem;
      margin-bottom: 16px;
    }
    .error-content p {
      color: rgba(255,255,255,0.65);
      font-size: 1rem;
      margin-bottom: 40px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }
    .error-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-content">
      <h1>404</h1>
      <h2>Página no encontrada</h2>
      <p>La página que buscas no existe o fue movida. Vuelve al inicio o cotiza tu seguro ahora.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary btn-lg">Volver al Inicio</a>
        <a href="cotizacion.html" class="btn btn-whatsapp btn-lg">Cotizar Ahora</a>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
  <script src="js/effects.js"></script>
</body>
</html>
